<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="박예찬의 KW Internet 기말 프로젝트 포트폴리오입니다. 6개 실습, 대시보드, 검색, 발표 모드가 포함되어 있습니다.">
  <meta property="og:title" content="박예찬 KW Internet Final Project">
  <meta property="og:description" content="실습 진행률, 사이트 검색, 발표 모드, 저장 기능을 갖춘 박예찬의 웹 포트폴리오입니다.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://devchanpark.github.io/KW-InterneT/">
  <meta property="og:image" content="https://devchanpark.github.io/KW-InterneT/assets/profile-visual.svg">
  <title>Search | 박예찬</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="search">
  <div class="scroll-progress" aria-hidden="true"><span></span></div>

  <header class="site-header">
    <div class="shell nav-shell">
      <a class="brand" href="index.html" aria-label="박예찬 홈">
        <span class="brand-mark">YC</span>
        <span>박예찬</span>
      </a>
      <nav class="site-nav" aria-label="주요 메뉴">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="search.html">Search</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="presentation.html">Pitch</a>
        <a href="contact.html">Contact</a>
      </nav>
      <button class="icon-button theme-toggle" type="button" data-theme-toggle aria-label="테마 변경" title="테마 변경">
        <span data-theme-icon>☾</span>
      </button>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="shell narrow reveal">
        <p class="eyebrow">Site Search</p>
        <h1>필요한 실습과 기능을 바로 찾습니다.</h1>
        <p>D-Day, DOM, 피자, 자동차, 저장 기능처럼 키워드를 입력하면 관련 페이지를 즉시 보여줍니다.</p>
      </div>
    </section>

    <section class="section-band">
      <div class="shell search-layout site-search-widget">
        <article class="tool-panel reveal">
          <h2>사이트 검색</h2>
          <label for="siteSearchInput">검색어</label>
          <input id="siteSearchInput" type="search" data-site-search-input placeholder="예: DOM, 피자, 저장, 대시보드">
          <div class="search-chip-row">
            <button type="button" data-search-chip="DOM">DOM</button>
            <button type="button" data-search-chip="이벤트">이벤트</button>
            <button type="button" data-search-chip="저장">저장</button>
            <button type="button" data-search-chip="발표">발표</button>
          </div>
          <p class="tool-result" data-site-search-count role="status"></p>
        </article>

        <article class="tool-panel reveal">
          <div class="panel-title">
            <h2>검색 결과</h2>
            <a class="text-button" href="portfolio.html">전체 보기</a>
          </div>
          <div class="search-result-list" data-site-search-results></div>
        </article>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="shell footer-inner">
      <small>&copy; <span id="year"></span> 박예찬</small>
      <a href="dashboard.html">Dashboard</a>
    </div>
  </footer>

  <button class="back-top" type="button" data-back-top aria-label="맨 위로 이동">↑</button>
  <script src="script.js"></script>
</body>
</html>
