<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스마트 피자 주문서 | 박예찬</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="event-order">
  <div class="scroll-progress" aria-hidden="true"><span></span></div>

  <header class="site-header">
    <div class="shell nav-shell">
      <a class="brand" href="index.html" aria-label="박예찬 홈">
        <span class="brand-mark">YC</span>
        <span>박예찬</span>
      </a>
      <nav class="site-nav" aria-label="주요 메뉴">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="contact.html">Contact</a>
      </nav>
      <button class="icon-button theme-toggle" type="button" data-theme-toggle aria-label="테마 변경" title="테마 변경">
        <span data-theme-icon>☾</span>
      </button>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="shell narrow reveal">
        <p class="eyebrow">15주차 실습 5 · Event Programming</p>
        <h1>스마트 피자 주문서</h1>
        <p>체크박스와 수량 입력이 바뀔 때마다 총액을 계산하고, 제출 이벤트를 제어합니다.</p>
      </div>
    </section>

    <section class="section-band">
      <div class="shell tool-grid">
        <form class="tool-panel reveal" id="orderForm" onsubmit="return validate(event)">
          <h2>메뉴 선택</h2>
          <div id="menu_box" class="menu-box">
            <label class="menu-item">
              <input type="checkbox" class="menu-check" value="15000" onchange="recalc()">
              <span>
                <strong>콤비네이션 피자</strong>
                <small>15,000원</small>
              </span>
              <input type="number" class="menu-qty" value="1" min="1" onchange="recalc()" oninput="recalc()" onkeyup="recalc()" aria-label="콤비네이션 피자 수량">
            </label>
            <label class="menu-item">
              <input type="checkbox" class="menu-check" value="18000" onchange="recalc()">
              <span>
                <strong>불고기 피자</strong>
                <small>18,000원</small>
              </span>
              <input type="number" class="menu-qty" value="1" min="1" onchange="recalc()" oninput="recalc()" onkeyup="recalc()" aria-label="불고기 피자 수량">
            </label>
            <label class="menu-item">
              <input type="checkbox" class="menu-check" value="12000" onchange="recalc()">
              <span>
                <strong>치즈 피자</strong>
                <small>12,000원</small>
              </span>
              <input type="number" class="menu-qty" value="1" min="1" onchange="recalc()" oninput="recalc()" onkeyup="recalc()" aria-label="치즈 피자 수량">
            </label>
          </div>

          <label for="address">배달 주소</label>
          <input id="address" type="text" placeholder="주소를 입력하세요" onblur="validateAddress()">

          <label for="total">총액</label>
          <input id="total" class="order-total" type="text" value="0" readonly>

          <button class="button primary" type="submit">주문하기</button>
          <p class="tool-result" id="orderResult" role="status"></p>
        </form>

        <article class="tool-panel reveal">
          <h2>주문 영수증</h2>
          <p class="helper-text">선택한 메뉴만 계산에 포함하고, 주문 성공 시 최근 주문 내역을 남깁니다.</p>
          <ul class="event-list receipt-list" id="orderReceipt"></ul>
        </article>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="shell footer-inner">
      <small>&copy; <span id="year"></span> 박예찬</small>
      <a href="portfolio.html">Portfolio</a>
    </div>
  </footer>

  <button class="back-top" type="button" data-back-top aria-label="맨 위로 이동">↑</button>
  <script src="script.js"></script>
</body>
</html>
